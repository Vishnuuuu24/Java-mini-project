<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/login_style.css}">
</head>
<body>
    <h2>LOGIN</h2>

    <div class="error-message" th:if="${param.error}">
        <p>Invalid username or password.</p>
    </div>

    <form method="POST" th:action="@{/users/login/}" th:object="${form}">
        <input type="hidden" name="csrfmiddlewaretoken" th:value="${_csrf.token}">

        <div class="form-group">
            <input type="text" class="form-control" placeholder="Username" th:field="*{username}">
            <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>

        <div class="form-group">
            <input type="password" class="form-control" placeholder="Password" th:field="*{password}">
            <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <button type="submit">Login</button>
    </form>
</body>
</html>
