<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Admin Dashboard</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/admin_styles.css}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>
    <body>
        <ul class="messages" th:if="${success != null or error != null}">
            <li class="success" th:if="${success != null}" th:text="${success}"></li>
            <li class="error" th:if="${error != null}" th:text="${error}"></li>
        </ul>

    <nav class="navbar">
        <div class="navbar-container">
            <a th:href="@{/users/admin/dashboard/}" class="navbar-brand">Student Management System</a>
            <div class="navbar-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="navbar-menu">
                <a th:href="@{/users/admin/dashboard/}" class="active">Dashboard</a>
                <a th:href="@{/students/}">Students</a>
                <a th:href="@{/faculty/faculty_list/}">Faculty</a>
                <a th:href="@{/courses/}">Courses</a>
                <a th:href="@{/tasks/}">Tasks</a>
            </div>
            <div class="user-info">
                <a th:href="@{/users/logout/}" class="logout-btn">Logout</a>
            </div>
        </div>
    </nav>
    <div id="welcome">
        Greetings : <span th:text="${#authentication != null ? #authentication.name : 'admin'}"></span> (<span th:text="${#authentication != null ? #authentication.name : 'admin'}"></span>)
    </div>
    <section id="Summary">
        <div class="summary-card">
            <h3>Total Students</h3>
            <span th:text="${total_students}"></span>
        </div>
        <div class="summary-card">
            <h3>Total Faculty</h3>
            <span th:text="${total_faculty}"></span>
        </div>
        <div class="summary-card">
            <h3>Total Tasks</h3>
            <span th:text="${total_tasks}"></span>
        </div>
        <div class="summary-card">
            <h3>Total Courses</h3>
            <span th:text="${total_courses}"></span>
        </div>
    </section>

    <div class="container mt-4">
        <section id="create-user" class="card mb-4">
            <div class="card-header">
                <h2>Create New User</h2>
            </div>
            <div class="card-body">
                <form method="POST" th:action="@{/users/admin/dashboard/}" th:object="${user_form}">
                    <input type="hidden" name="csrfmiddlewaretoken" th:value="${_csrf.token}">

                    <div th:if="${#fields.hasGlobalErrors()}">
                        <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
                    </div>

                    <p>
                        <label for="id_username">Username *</label>
                        <input type="text" id="id_username" class="form-control" placeholder="Enter username" th:field="*{username}">
                        <small class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></small>
                    </p>

                    <p>
                        <label for="id_email">Email *</label>
                        <input type="email" id="id_email" class="form-control" placeholder="Enter email address" th:field="*{email}">
                        <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                    </p>

                    <p>
                        <label for="id_first_name">First Name *</label>
                        <input type="text" id="id_first_name" class="form-control" placeholder="Enter first name" th:field="*{firstName}">
                        <small class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></small>
                    </p>

                    <p>
                        <label for="id_last_name">Last Name</label>
                        <input type="text" id="id_last_name" class="form-control" placeholder="Enter last name" th:field="*{lastName}">
                        <small class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></small>
                    </p>

                    <p>
                        <label for="id_password1">Password *</label>
                        <input type="password" id="id_password1" class="form-control" placeholder="Enter password" th:field="*{password}">
                        <small>Your password must contain at least 8 characters and cannot be entirely numeric.</small>
                        <small class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
                    </p>

                    <p>
                        <label for="id_password2">Confirm Password *</label>
                        <input type="password" id="id_password2" class="form-control" placeholder="Confirm password" th:field="*{confirmPassword}">
                        <small>Enter the same password as above, for verification.</small>
                        <small class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></small>
                    </p>

                    <p>
                        <label for="id_role">Role *</label>
                        <select id="id_role" class="form-control" th:field="*{role}">
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                            <option value="admin">Admin</option>
                        </select>
                        <small class="text-danger" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></small>
                    </p>

                    <button type="submit" name="create_user" class="btn btn-primary">Create User</button>
                </form>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleMenu() {
            const menu = document.querySelector('.navbar-menu');
            menu.classList.toggle('active');
        }
    </script>
    </body>
</html>
