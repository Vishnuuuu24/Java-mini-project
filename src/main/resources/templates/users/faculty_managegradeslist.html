<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="'Manage Grades - ' + ${course.name}">Manage Grades</title>
    <link rel="stylesheet" th:href="@{/css/faculty_styles.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css">
</head>
<body>
    <a th:href="@{/users/faculty/dashboard/}" class="back-btn">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
    </a>
    <button id="darkModeToggle">Light Mode</button>
    <script>
        function setDarkMode(on) {
            if(on) {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeToggle').innerText = 'Light Mode';
            } else {
                document.body.classList.remove('dark-mode');
                document.getElementById('darkModeToggle').innerText = 'Dark Mode';
            }
        }
        let dark = localStorage.getItem('darkMode');
        if(dark === null) dark = 'true';
        setDarkMode(dark === 'true');
        document.getElementById('darkModeToggle').onclick = function() {
            const isDark = !document.body.classList.contains('dark-mode');
            setDarkMode(isDark);
            localStorage.setItem('darkMode', isDark);
        };
    </script>

    <section class="hero-section">
            <a th:href="@{/users/logout/}" class="logout-btn">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </a>
        <div class="hero-content">
            <h1 class="hero-welcome">Manage Grades - <span th:text="${course.name}"></span></h1>
            <p class="text-muted" th:text="${course.code}"></p>
        </div>
    </section>

    <div class="container mt-4">
        <div class="card">
            <div class="card-body">
                <form id="searchForm" class="row g-3">
                    <input type="hidden" name="csrfmiddlewaretoken" th:value="${_csrf.token}">
                    <div class="col-md-6">
                        <input type="text" class="form-control" id="searchInput" placeholder="Search by student name or ID...">
                    </div>
                    <div class="col-md-6">
                        <select class="form-select" id="gradeFilter">
                            <option value="all">All Students</option>
                            <option value="pending">Pending Grades</option>
                            <option value="graded">Graded Students</option>
                        </select>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="container content-section">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title"><i class="bi bi-people me-2"></i>Students</h5>
            </div>
            <div class="card-body">
                <ul class="list-group list-group-flush" id="studentList">
                    <li class="list-group-item student-item" th:each="student_grade : ${pending_grades}" th:attr="data-student-id=${student_grade.student.id},data-grade-id=${student_grade.id}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-0" th:text="${student_grade.student.user.firstName + ' ' + student_grade.student.user.lastName}"></h6>
                                <small class="text-muted">ID: <span th:text="${student_grade.student.registerNo}"></span></small>
                            </div>
                            <div>
                                <span class="status-badge pending me-3">Grade Pending</span>
                                <button class="btn btn-primary btn-sm assign-grade-btn" data-bs-toggle="modal" data-bs-target="#gradeModal">
                                    <i class="bi bi-pencil me-1"></i>Assign Grade
                                </button>
                            </div>
                        </div>
                    </li>
                    <li class="list-group-item text-center text-muted" th:if="${#lists.isEmpty(pending_grades)}">No pending grades for this course.</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="modal fade" id="gradeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Assign Grade</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="studentInfo"></div>
                    <select class="form-select mt-3" id="gradeSelect">
                        <option value="">Select Grade</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                        <option value="F">F</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveGradeBtn">Save Grade</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script th:src="@{/js/faculty_dashboard.js}"></script>
</body>
</html>
