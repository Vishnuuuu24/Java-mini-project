<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Faculty</title>
    <meta name="csrf-token" th:content="${_csrf.token}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin_styles.css}">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script th:src="@{/js/admin_scripts.js}"></script>
    <script th:src="@{/js/faculty_manage.js}"></script>
    <script th:src="@{/js/delete_manage.js}"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a th:href="@{/users/admin/dashboard/}" class="navbar-brand">Student Management System</a>
            <div class="navbar-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="navbar-menu">
                <a th:href="@{/users/admin/dashboard/}">Dashboard</a>
                <a th:href="@{/students/}">Students</a>
                <a th:href="@{/faculty/faculty_list/}" class="active">Faculty</a>
                <a th:href="@{/courses/}">Courses</a>
                <a th:href="@{/tasks/}">Tasks</a>
            </div>
            <div class="user-info">
                <a th:href="@{/users/logout/}" class="logout-btn">Logout</a>
            </div>
        </div>
    </nav>

    <ul class="messages" th:if="${success != null or error != null}">
        <li class="success" th:if="${success != null}" th:text="${success}"></li>
        <li class="error" th:if="${error != null}" th:text="${error}"></li>
    </ul>

    <div class="manage-faculty-container">
        <h1 th:text="|Manage ${faculty.user.firstName} ${faculty.user.lastName}|"></h1>

        <form method="POST" id="updateForm" onchange="enableUpdateButton()" th:action="@{/faculty/{facultyId}/manage/(facultyId=${faculty.id})}" th:object="${faculty_update_form}">
            <input type="hidden" name="csrfmiddlewaretoken" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{facultyId}" th:value="${faculty.facultyId}">
            <div class="faculty-info">
                <p><strong>First Name:</strong> <input type="text" name="first_name" th:value="${faculty.user.firstName}" onchange="enableUpdateButton()"></p>
                <p><strong>Last Name:</strong> <input type="text" name="last_name" th:value="${faculty.user.lastName}" onchange="enableUpdateButton()"></p>
                <p><strong>Username:</strong> <span th:text="${faculty.user.username}"></span></p>
                <p><strong>Faculty ID:</strong> <span th:text="${faculty.facultyId}"></span></p>
                <p><strong>Department:</strong> <input type="text" th:field="*{department}" onchange="enableUpdateButton()"></p>
                <p><strong>Designation:</strong> <input type="text" th:field="*{designation}" onchange="enableUpdateButton()"></p>
                <p><strong>Email:</strong> <input type="email" name="email" th:value="${faculty.email}" onchange="enableUpdateButton()"></p>
                <p><strong>Phone Number:</strong> <input type="text" th:field="*{phone}" onchange="enableUpdateButton()"></p>
            </div>
            <button type="submit" name="update_details" id="updateButton" disabled>Update Details</button>
        </form>

        <h2>Assigned Courses</h2>
        <ul class="course-list">
            <li th:each="course : ${courses}" th:attr="data-course-id=${course.id}">
                <span th:text="|${course.name} (${course.code})|"></span>
                <button type="button" class="remove-course" th:attr="data-faculty-id=${faculty.id},data-course-id=${course.id}" title="Remove course">×</button>
            </li>
            <li th:if="${#lists.isEmpty(courses)}">No courses assigned yet.</li>
        </ul>

        <h2>Assign Course</h2>
        <form method="POST" th:action="@{/faculty/{facultyId}/manage/(facultyId=${faculty.id})}" th:object="${course_form}">
            <input type="hidden" name="csrfmiddlewaretoken" th:value="${_csrf.token}">
            <div th:if="${#fields.hasGlobalErrors()}">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            </div>
            <div class="course-assignment">
                <select th:field="*{courseId}" class="select2">
                    <option value="">---------</option>
                    <option th:each="course : ${@courseRepository.findAll()}"
                            th:value="${course.id}"
                            th:text="|${course.name} (${course.code})|"></option>
                </select>
            </div>
            <button type="submit" name="submit_course">Assign Course</button>
        </form>

        <div class="delete-container">
            <button type="button" class="delete-button" th:attr="data-faculty-id=${faculty.id}">Delete</button>
        </div>

        <div class="back-link-container">
            <a th:href="@{/users/admin/dashboard/}" class="back-link">← Back to admin dashboard</a>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            $('.select2').select2({
                placeholder: "Search and select a course...",
                allowClear: true,
                width: '100%'
            });
        });
    </script>
</body>
</html>
