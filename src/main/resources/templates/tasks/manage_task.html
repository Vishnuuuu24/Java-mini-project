<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Task</title>
    <link rel="stylesheet" th:href="@{/css/admin_styles.css}">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script th:src="@{/js/delete_manage.js}"></script>
    <script th:src="@{/js/task_manage.js}"></script>
    <style>
        .form-control {
            width: 100%;
            padding: 0.375rem 0.75rem;
            margin-bottom: 1rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
        }
        .select2-container {
            width: 100% !important;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a th:href="@{/users/admin/dashboard/}" class="navbar-brand">Student Management System</a>
            <div class="navbar-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="navbar-menu">
                <a th:href="@{/users/admin/dashboard/}">Dashboard</a>
                <a th:href="@{/students/}">Students</a>
                <a th:href="@{/faculty/faculty_list/}">Faculty</a>
                <a th:href="@{/courses/}">Courses</a>
                <a th:href="@{/tasks/}" class="active">Tasks</a>
            </div>
            <div class="user-info">
                <a th:href="@{/users/logout/}" class="logout-btn">Logout</a>
            </div>
        </div>
    </nav>

    <ul class="messages" th:if="${success != null or error != null}">
        <li class="success" th:if="${success != null}" th:text="${success}"></li>
        <li class="error" th:if="${error != null}" th:text="${error}"></li>
    </ul>

    <div class="container mt-4">
        <section id="manage-task" class="card mb-4">
            <div class="card-header">
                <h2 th:text="${'Manage Task: ' + task.title}">Manage Task: </h2>
            </div>
            <div class="card-body">
                <form method="POST" th:action="@{/tasks/{taskId}/manage/(taskId=${task.id})}" th:object="${form}">
                    <input type="hidden" name="csrfmiddlewaretoken" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label class="form-label" for="id_title">Title:</label>
                        <input type="text" class="form-control" id="id_title" th:field="*{title}">
                        <div class="invalid-feedback d-block" th:errors="*{title}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="id_description">Description:</label>
                        <textarea class="form-control" id="id_description" th:field="*{description}"></textarea>
                        <div class="invalid-feedback d-block" th:errors="*{description}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="id_assigned_to">Assigned to:</label>
                        <select class="form-control" id="id_assigned_to" th:field="*{assignedStudentIds}" multiple>
                            <option th:each="student : ${students}" th:value="${student.id}" th:text="${student.firstName + ' ' + student.lastName}"></option>
                        </select>
                        <div class="invalid-feedback d-block" th:errors="*{assignedStudentIds}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="id_due_date">Due date:</label>
                        <input type="date" class="form-control" id="id_due_date" th:field="*{dueDate}">
                        <div class="invalid-feedback d-block" th:errors="*{dueDate}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="id_status">Status:</label>
                        <select class="form-control" id="id_status" th:field="*{status}">
                            <option value="Pending">Pending</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="id_priority">Priority:</label>
                        <select class="form-control" id="id_priority" th:field="*{priority}">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                        <div class="invalid-feedback d-block" th:errors="*{priority}"></div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <button type="submit" name="update_task" class="btn btn-primary">Update Task</button>
                        <div class="delete-container">
                            <button type="button" class="delete-button" th:attr="data-task-id=${task.id}">Delete</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </div>

    <div class="back-link-container">
        <a th:href="@{/tasks/}" class="back-link">← Back to Task List</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
