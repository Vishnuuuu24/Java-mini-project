<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin_styles.css}">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script th:src="@{/js/task_manage.js}"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a th:href="@{/users/admin/dashboard/}" class="navbar-brand">Student Management System</a>
            <div class="navbar-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="navbar-menu">
                <a th:href="@{/users/admin/dashboard/}">Dashboard</a>
                <a th:href="@{/students/}">Students</a>
                <a th:href="@{/faculty/faculty_list/}">Faculty</a>
                <a th:href="@{/courses/}">Courses</a>
                <a th:href="@{/tasks/}" class="active">Tasks</a>
            </div>
            <div class="user-info">
                <a th:href="@{/users/logout/}" class="logout-btn">Logout</a>
            </div>
        </div>
    </nav>

    <ul class="messages" th:if="${success != null or error != null}">
        <li class="success" th:if="${success != null}" th:text="${success}"></li>
        <li class="error" th:if="${error != null}" th:text="${error}"></li>
    </ul>

    <div class="container mt-4">
        <section id="create-task" class="card mb-4">
            <div class="card-header">
                <h2>Create New Task</h2>
            </div>
            <div class="card-body">
                <form method="POST" class="task-form" th:action="@{/tasks/}" th:object="${task_form}">
                    <input type="hidden" name="csrfmiddlewaretoken" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label for="id_title">Title:</label>
                        <input type="text" class="form-control" id="id_title" th:field="*{title}">
                        <div class="invalid-feedback d-block" th:errors="*{title}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="id_description">Description:</label>
                        <textarea class="form-control" id="id_description" th:field="*{description}"></textarea>
                        <div class="invalid-feedback d-block" th:errors="*{description}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="id_assigned_to">Assigned to:</label>
                        <div class="d-flex align-items-center mb-2">
                            <button type="button" id="selectAllBtn" class="btn btn-sm btn-outline-secondary me-2">Select All</button>
                            <button type="button" id="clearAllBtn" class="btn btn-sm btn-outline-secondary">Clear All</button>
                        </div>
                        <select class="form-control" id="id_assigned_to" th:field="*{assignedStudentIds}" multiple>
                            <option th:each="student : ${students}" th:value="${student.id}" th:text="${student.firstName + ' ' + student.lastName}"></option>
                        </select>
                        <div class="invalid-feedback d-block" th:errors="*{assignedStudentIds}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="id_due_date">Due date:</label>
                        <input type="date" class="form-control" id="id_due_date" th:field="*{dueDate}">
                        <div class="invalid-feedback d-block" th:errors="*{dueDate}"></div>
                    </div>

                    <input type="hidden" th:field="*{status}" th:value="Pending">

                    <div class="mb-3">
                        <label for="id_priority">Priority:</label>
                        <select class="form-control" id="id_priority" th:field="*{priority}">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                        <div class="invalid-feedback d-block" th:errors="*{priority}"></div>
                    </div>

                    <button type="submit" name="create_task" class="btn btn-primary">Create Task</button>
                </form>
            </div>
        </section>
    </div>

    <form method="GET" th:action="@{/tasks/}" class="search-form">
        <input type="text" name="q" placeholder="Search tasks..." th:value="${q}">
        <button type="submit">Search</button>
    </form>

    <table>
        <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Assigned To</th>
            <th>Due Date</th>
            <th>Progress</th>
            <th>Priority</th>
            <th>Action</th>
        </tr>
        <tr th:each="task : ${tasks}">
            <td th:text="${task.title}"></td>
            <td th:text="${task.description}"></td>
            <td>
                <span th:if="${task.assignedStudents != null and !task.assignedStudents.isEmpty()}"
                      th:text="${task.assignedStudents.iterator().next().firstName + ' ' + task.assignedStudents.iterator().next().lastName}"></span>
                <span th:if="${task.assignedStudents != null and task.assignedStudents.size() > 1}"
                      th:text="${'+ ' + (task.assignedStudents.size() - 1) + ' more'}"></span>
                <span th:if="${task.assignedStudents == null or task.assignedStudents.isEmpty()}">No students assigned</span>
            </td>
            <td th:text="${task.dueDate}"></td>
            <td th:with="
                inProgressCount=${task.studentProgress.?[status != null and status.value == 'In Progress'].size()},
                completedCount=${task.studentProgress.?[status != null and status.value == 'Completed'].size()},
                pendingCount=${T(java.lang.Math).max(0, task.assignedStudents.size() - inProgressCount - completedCount)},
                completedAll=${task.assignedStudents.size() > 0 and completedCount == task.assignedStudents.size()}">
                <span th:if="${completedAll}" class="status-badge completed">Completed</span>
                <div th:if="${!completedAll}" class="progress-container">
                    <span class="status-badge pending" th:text="${'Pending (' + pendingCount + ')'}">Pending (0)</span>
                    <span class="status-badge in-progress" th:text="${'In Progress (' + inProgressCount + ')'}">In Progress (0)</span>
                    <span class="status-badge completed" th:text="${'Completed (' + completedCount + ')'}">Completed (0)</span>
                </div>
            </td>
            <td th:text="${task.priority != null ? task.priority.value : ''}"></td>
            <td>
                <a th:href="@{/tasks/{taskId}/manage/(taskId=${task.id})}">
                    Manage
                </a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(tasks)}"><td colspan="7">No tasks found.</td></tr>
    </table>
    <div class="back-link-container">
        <a th:href="@{/users/admin/dashboard/}" class="back-link">← Back to admin dashboard</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleMenu() {
            const menu = document.querySelector('.navbar-menu');
            menu.classList.toggle('active');
        }

        // Initialize Select2
        $(document).ready(function() {
            $('#id_assigned_to').select2({
                placeholder: "Select students...",
                allowClear: true,
                width: '100%'
            });

            // Select All button functionality
            $('#selectAllBtn').click(function() {
                $('#id_assigned_to option').prop('selected', true);
                $('#id_assigned_to').trigger('change');
            });

            // Clear All button functionality
            $('#clearAllBtn').click(function() {
                $('#id_assigned_to option').prop('selected', false);
                $('#id_assigned_to').trigger('change');
            });
        });
    </script>
</body>
</html>
