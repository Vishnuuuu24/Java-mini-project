<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Grades</title>
    <link rel="stylesheet" th:href="@{/css/student_styles.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<section class="hero-section">
    <div class="hero-actions">
        <a th:href="@{/users/student/dashboard/}" class="settings-btn" aria-label="Back to dashboard">
            <i class="bi bi-arrow-left"></i>
        </a>
        <a th:href="@{/users/logout/}" class="logout-btn">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
        </a>
    </div>
    <div class="hero-content">
        <h1 class="hero-welcome">My Grades</h1>
        <div class="hero-stats">
            <div class="stat-card">
                <div class="stat-number" th:text="${gpa}"></div>
                <div class="stat-label">Current GPA</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${#lists.size(grades)}"></div>
                <div class="stat-label">Total Courses Graded</div>
            </div>
        </div>
    </div>
</section>

<div class="container content-section">
    <div class="card">
        <div class="card-header">
            <h5 class="card-title mb-0"><i class="bi bi-award me-2"></i>Grade Sheet</h5>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead>
                    <tr>
                        <th>Course</th>
                        <th>Code</th>
                        <th>Grade</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="grade : ${grades}">
                        <td th:text="${grade.course.name}"></td>
                        <td th:text="${grade.course.code}"></td>
                        <td>
                            <span class="badge bg-primary" th:text="${grade.grade}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(grades)}">
                        <td colspan="3" class="text-center text-muted">No grades available.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
