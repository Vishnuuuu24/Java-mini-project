<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin_styles.css}">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a th:href="@{/users/admin/dashboard/}" class="navbar-brand">Student Management System</a>
            <div class="navbar-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="navbar-menu">
                <a th:href="@{/users/admin/dashboard/}">Dashboard</a>
                <a th:href="@{/students/}" class="active">Students</a>
                <a th:href="@{/faculty/faculty_list/}">Faculty</a>
                <a th:href="@{/courses/}">Courses</a>
                <a th:href="@{/tasks/}">Tasks</a>
            </div>
            <div class="user-info">
                <a th:href="@{/users/logout/}" class="logout-btn">Logout</a>
            </div>
        </div>
    </nav>

    <ul class="messages" th:if="${success != null or error != null}">
        <li class="success" th:if="${success != null}" th:text="${success}"></li>
        <li class="error" th:if="${error != null}" th:text="${error}"></li>
    </ul>

    <div class="manage-student-container">
      <div class="card shadow mb-4">
        <div class="card-body">
          <form method="POST" id="updateForm" th:action="@{/students/{studentId}/(studentId=${student.id})}" th:object="${student_update_form}">
            <input type="hidden" name="csrfmiddlewaretoken" th:value="${_csrf.token}">
            <h1 class="h4 mb-4" th:text="|Manage ${student.user.firstName} ${student.user.lastName} (${student.user.username})|"></h1>
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">First Name:</label>
                <input type="text" name="first_name" th:value="${student.user.firstName}" class="form-control" onchange="enableUpdateButton()">
              </div>
              <div class="col-md-4">
                <label class="form-label">Last Name:</label>
                <input type="text" name="last_name" th:value="${student.user.lastName}" class="form-control" onchange="enableUpdateButton()">
              </div>
              <div class="col-md-4">
                <label class="form-label">Register No:</label>
                <input type="text" th:field="*{registerNo}" class="form-control" onchange="enableUpdateButton()">
              </div>
              <div class="col-md-4">
                <label class="form-label">Department:</label>
                <input type="text" th:field="*{department}" class="form-control" onchange="enableUpdateButton()">
              </div>
              <div class="col-md-4">
                <label class="form-label">Level:</label>
                <select th:field="*{level}" class="form-control" onchange="enableUpdateButton()">
                  <option value="UG">Undergraduate</option>
                  <option value="PG">Graduate</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Attendance:</label>
                <div class="attendance-input-wrapper">
                  <input type="number" th:field="*{attendance}" min="0" max="100" step="0.1" class="form-control attendance-input" onchange="enableUpdateButton()">
                </div>
              </div>
            </div>
            <div class="text-center mt-4">
              <span class="fw-bold" th:text="|Current GPA: ${gpa}|"></span>
            </div>
            <div class="mt-4 text-end">
              <button type="submit" name="update_details" id="updateButton" class="btn btn-success btn-lg" disabled>Update Details</button>
            </div>
          </form>
        </div>
      </div>

        <h2>Enrolled Courses</h2>
        <ul class="course-list">
            <li th:each="c : ${courses}">
                <span th:text="|${c.name} (${c.code})|"></span>
                <button class="remove-course" th:attr="data-course-id=${c.id},data-student-id=${student.id}" title="Remove course">
                    ×
                </button>
            </li>
            <li th:if="${#lists.isEmpty(courses)}">No courses assigned yet.</li>
        </ul>

        <h2>Assign Course</h2>
        <form method="POST" th:action="@{/students/{studentId}/(studentId=${student.id})}" th:object="${course_form}">
            <input type="hidden" name="csrfmiddlewaretoken" th:value="${_csrf.token}">
            <div th:if="${#fields.hasGlobalErrors()}">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            </div>
            <div class="course-assignment">
                <select th:field="*{courseId}" class="select2">
                    <option value="">---------</option>
                    <option th:each="course : ${@courseRepository.findAll()}"
                            th:value="${course.id}"
                            th:text="|${course.name} (${course.code})|"></option>
                </select>
            </div>
            <button type="submit" name="submit_course">Assign Course</button>
        </form>

        <h2>Grades</h2>
        <div class="export-buttons">
            <a th:href="@{/students/{studentId}/export/csv/(studentId=${student.id})}" class="export-button">Export Grades as CSV</a>
            <a th:href="@{/students/{studentId}/export/pdf/(studentId=${student.id})}" class="export-button">Export Grades as PDF</a>
        </div>
        <ul>
            <li th:each="g : ${grades}" th:text="|${g.course.name}: ${g.grade}|"></li>
            <li th:if="${#lists.isEmpty(grades)}">No grades assigned yet.</li>
        </ul>

        <h2>Assign / Update Grade</h2>
        <form method="POST" th:action="@{/students/{studentId}/(studentId=${student.id})}" th:object="${grade_form}">
            <input type="hidden" name="csrfmiddlewaretoken" th:value="${_csrf.token}">
            <div th:if="${#fields.hasGlobalErrors()}">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            </div>
            <p>
                <label for="id_course_id">Course:</label>
                <select id="id_course_id" th:field="*{courseId}">
                    <option value="">---------</option>
                    <option th:each="course : ${courses}"
                            th:value="${course.id}"
                            th:text="|${course.name} (${course.code})|"></option>
                </select>
            </p>
            <p>
                <label for="id_grade">Grade:</label>
                <select id="id_grade" th:field="*{grade}">
                    <option value="">---------</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="F">F</option>
                </select>
            </p>
            <button type="submit" name="submit_grade">Save Grade</button>
        </form>

        <div class="delete-container">
            <button type="button" class="delete-button" th:attr="data-student-id=${student.id}">Delete</button>
        </div>

        <div class="back-link-container">
            <a th:href="@{/users/admin/dashboard/}" class="back-link">← Back to admin dashboard</a>
        </div>
    </div>

    <script th:src="@{/js/student_manage.js}"></script>
    <script th:src="@{/js/delete_manage.js}"></script>
</body>
</html>
